name: Daily AI News to Slack

on:
  schedule:
    # 毎朝 7:07 (日本時間) に実行。
    # 2026年3月からGitHub Actionsはタイムゾーン指定に対応したのでJSTで直接書けます。
    - cron: '7 7 * * *'
      timezone: 'Asia/Tokyo'
  # 手動実行も可能にしておく（テスト用。ActionsタブのRun workflowから動かせる）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: AIニュース要約をSlackに送信
        env:
          TZ: 'Asia/Tokyo'
          NOTIFY_TARGETS: 'slack,discord'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      - name: 送信済みURLリストをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent.json
          if [ -f run_state.json ]; then
            git add run_state.json
          fi
          if git diff --cached --quiet; then
            echo "sent.json に差分がないためコミットをスキップします"
          else
            git commit -m "Update sent news URLs"
            git push
          fi
