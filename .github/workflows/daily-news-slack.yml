name: Daily AI News to Slack

on:
  schedule:
    # 毎朝 7:00 (日本時間) に実行。
    # 2026年3月からGitHub Actionsはタイムゾーン指定に対応したのでJSTで直接書けます。
    - cron: '0 7 * * *'
      timezone: 'Asia/Tokyo'
  # 手動実行も可能にしておく（テスト用。ActionsタブのRun workflowから動かせる）
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: AIニュース要約をSlackに送信
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main_slack.py
